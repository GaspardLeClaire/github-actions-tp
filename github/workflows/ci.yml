name: CI
on: 
  push: 
    branches: [main]
jobs: 
  quality: 
    runs-on: ubuntu-latest

    steps: 
      -name: Checkout #copie le code sur la vm
        uses: actions/checkout@v4

      -name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Upload Coverage
        uses: action/upload-artifact@v4
        with: 
          name: coverage-report
          path: coverage/
          retention-days: 7 